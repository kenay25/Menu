<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Historial — La Esquina del Sushi</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#E8547A;--pink-light:#F9D0DC;--pink-deep:#C23060;
  --cream:#FFF8F9;--dark:#1A0A10;--card:#FFFFFF;
  --muted:#9E7080;--border:rgba(232,84,122,0.18);
  --green:#25D366;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--dark);min-height:100vh;}

/* HEADER */
.header{background:var(--dark);padding:0;position:relative;overflow:hidden;}
.header-sakura{position:absolute;inset:0;pointer-events:none;}
.petal{position:absolute;animation:fall linear infinite;opacity:0.12;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:0.18}100%{transform:translateY(130px) rotate(360deg);opacity:0}}
.header-inner{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:18px 22px;gap:14px;flex-wrap:wrap;}
.logo-area{display:flex;align-items:center;gap:12px;}
.logo-kanji{font-family:'Noto Serif JP',serif;font-size:44px;color:var(--pink);line-height:1;text-shadow:0 0 24px rgba(232,84,122,0.5);}
.logo-text h1{font-family:'Noto Serif JP',serif;font-size:24px;color:#fff;font-weight:700;line-height:1.1;}
.logo-text h1 span{color:var(--pink);}
.logo-text small{display:block;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.btn-back{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.07);border:1px solid rgba(232,84,122,0.3);color:var(--pink-light);padding:9px 16px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;text-decoration:none;}
.btn-back:hover{background:rgba(232,84,122,0.15);color:#fff;}

/* MAIN */
.main{max-width:700px;margin:0 auto;padding:24px 16px 60px;}

/* PROFILE CARD */
.profile-card{background:var(--dark);border-radius:20px;padding:22px 24px;margin-bottom:24px;border:1px solid rgba(232,84,122,0.25);position:relative;overflow:hidden;}
.profile-card::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(232,84,122,0.2),transparent 70%);border-radius:50%;}
.profile-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;font-weight:600;}
.profile-fields{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.profile-field{display:flex;flex-direction:column;gap:5px;}
.profile-field label{font-size:11px;color:var(--muted);font-weight:500;}
.profile-field input{background:rgba(255,255,255,0.06);border:1.5px solid rgba(232,84,122,0.2);border-radius:10px;padding:10px 13px;font-family:'DM Sans',sans-serif;font-size:14px;color:#fff;outline:none;transition:border-color 0.2s;}
.profile-field input:focus{border-color:var(--pink);}
.profile-field input::placeholder{color:rgba(255,255,255,0.2);}
.profile-field.full{grid-column:1/-1;}
.btn-save-profile{margin-top:14px;width:100%;background:var(--pink);color:#fff;border:none;border-radius:11px;padding:11px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background 0.2s;}
.btn-save-profile:hover{background:var(--pink-deep);}
.save-ok{display:none;text-align:center;font-size:12px;color:#4CAF50;margin-top:8px;font-weight:600;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px;}
.stat-box{background:var(--card);border-radius:14px;padding:14px 12px;text-align:center;border:1px solid var(--border);box-shadow:0 2px 8px rgba(194,48,96,0.06);}
.stat-num{font-family:'Noto Serif JP',serif;font-size:26px;font-weight:700;color:var(--pink);}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;}

/* SECTION TITLE */
.sec-title{font-family:'Noto Serif JP',serif;font-size:20px;color:var(--pink);font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sec-title span{font-size:13px;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400;}

/* ORDER CARDS */
.orders-list{display:flex;flex-direction:column;gap:14px;}
.order-card{background:var(--card);border-radius:16px;border:1.5px solid var(--border);overflow:hidden;box-shadow:0 2px 10px rgba(194,48,96,0.07);transition:box-shadow 0.2s;}
.order-card:hover{box-shadow:0 6px 22px rgba(194,48,96,0.13);}
.order-card-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:linear-gradient(90deg,#FFF8F9,#FDE0E8);border-bottom:1px solid var(--border);cursor:pointer;}
.order-head-left{display:flex;flex-direction:column;gap:2px;}
.order-num{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.order-date{font-size:13px;color:var(--dark);font-weight:600;}
.order-head-right{display:flex;align-items:center;gap:10px;}
.order-total{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:700;color:var(--pink);}
.order-chevron{font-size:14px;color:var(--muted);transition:transform 0.2s;}
.order-card.open .order-chevron{transform:rotate(180deg);}
.order-body{display:none;padding:14px 16px;}
.order-card.open .order-body{display:block;}
.order-item-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.order-item-row:last-child{border-bottom:none;}
.oi-emoji{font-size:20px;width:28px;text-align:center;}
.oi-info{flex:1;}
.oi-name{font-weight:600;font-size:13.5px;}
.oi-qty{font-size:11px;color:var(--muted);}
.oi-mods{font-size:11px;margin-top:2px;line-height:1.6;}
.oi-prot{color:#8B5CF6;}
.oi-sauce{color:#0369A1;}
.oi-price{font-weight:700;color:var(--pink);font-size:14px;white-space:nowrap;}
.order-notas{margin-top:10px;background:#FFF0F4;border-radius:9px;padding:9px 12px;font-size:12px;color:var(--muted);line-height:1.6;}
.order-notas strong{color:var(--dark);}
.btn-reorder{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:14px;background:var(--green);color:#fff;border:none;border-radius:11px;padding:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:background 0.2s;}
.btn-reorder:hover{background:#1DA851;}
.btn-reorder svg{width:16px;height:16px;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-state .empty-icon{font-size:50px;display:block;margin-bottom:14px;}
.empty-state h3{font-family:'Noto Serif JP',serif;font-size:20px;color:var(--pink);margin-bottom:8px;}
.empty-state p{font-size:14px;line-height:1.6;}
.btn-go-menu{display:inline-flex;align-items:center;gap:8px;margin-top:18px;background:var(--pink);color:#fff;border:none;border-radius:50px;padding:12px 24px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;}

/* CLEAR HIST */
.hist-actions{display:flex;justify-content:flex-end;margin-bottom:10px;}
.btn-clear-hist{background:transparent;border:1px solid rgba(194,48,96,0.2);color:var(--muted);padding:6px 13px;border-radius:50px;font-size:11.5px;cursor:pointer;transition:all 0.2s;}
.btn-clear-hist:hover{border-color:var(--pink);color:var(--pink);}

@media(max-width:480px){
  .profile-fields{grid-template-columns:1fr;}
  .profile-field.full{grid-column:1;}
  .stats-row{grid-template-columns:repeat(3,1fr);}
  .stat-num{font-size:20px;}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-sakura" id="sakura"></div>
  <div class="header-inner">
    <div class="logo-area">
      <div class="logo-kanji">鮎</div>
      <div class="logo-text">
        <h1>La Esquina<br><span>del Sushi</span></h1>
        <small>Historial de pedidos</small>
      </div>
    </div>
    <a class="btn-back" href="index.html">
      &#x2190; Volver al menú
    </a>
  </div>
</header>

<main class="main">

  <!-- PERFIL -->
  <div class="profile-card" id="profile-card">
    <div class="profile-label">&#x1F464; Mi información</div>
    <div class="profile-fields">
      <div class="profile-field">
        <label>Nombre</label>
        <input type="text" id="pf-nombre" placeholder="Tu nombre" autocomplete="name">
      </div>
      <div class="profile-field">
        <label>Teléfono</label>
        <input type="tel" id="pf-telefono" placeholder="626 123 4567" autocomplete="tel">
      </div>
      <div class="profile-field full">
        <label>Dirección de entrega</label>
        <input type="text" id="pf-direccion" placeholder="Calle, número, colonia..." autocomplete="street-address">
      </div>
      <div class="profile-field full">
        <label>Referencias</label>
        <input type="text" id="pf-refs" placeholder="Entre calles, portón azul..." autocomplete="off">
      </div>
    </div>
    <button class="btn-save-profile" onclick="saveProfile()">&#x2713; Guardar información</button>
    <div class="save-ok" id="save-ok">&#x2705; Información guardada</div>
  </div>

  <!-- ESTADÍSTICAS -->
  <div class="stats-row" id="stats-row" style="display:none">
    <div class="stat-box">
      <div class="stat-num" id="stat-pedidos">0</div>
      <div class="stat-lbl">Pedidos</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-total">$0</div>
      <div class="stat-lbl">Total gastado</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-fav">—</div>
      <div class="stat-lbl">Tu favorito</div>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div id="hist-section">
    <div class="sec-title">&#x1F4CB; Mis pedidos <span id="hist-count"></span></div>
    <div class="hist-actions" id="hist-actions" style="display:none">
      <button class="btn-clear-hist" onclick="clearHist()">&#x1F5D1; Borrar historial</button>
    </div>
    <div class="orders-list" id="orders-list"></div>
  </div>

</main>

<script>
var WA = '526421342959';

// ---- PÉTALOS ----
function initPetals() {
  var s = document.getElementById('sakura');
  for (var i = 0; i < 14; i++) {
    var p = document.createElement('div');
    p.className = 'petal';
    p.textContent = '🌸';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (3 + Math.random() * 4) + 's';
    p.style.animationDelay = (Math.random() * 5) + 's';
    p.style.fontSize = (11 + Math.random() * 9) + 'px';
    s.appendChild(p);
  }
}

// ---- PERFIL ----
function loadProfile() {
  try {
    var p = JSON.parse(localStorage.getItem('sushi_profile') || '{}');
    if (p.nombre)    document.getElementById('pf-nombre').value    = p.nombre;
    if (p.telefono)  document.getElementById('pf-telefono').value  = p.telefono;
    if (p.direccion) document.getElementById('pf-direccion').value = p.direccion;
    if (p.refs)      document.getElementById('pf-refs').value      = p.refs;
  } catch(e) {}
}

function saveProfile() {
  var profile = {
    nombre:    document.getElementById('pf-nombre').value.trim(),
    telefono:  document.getElementById('pf-telefono').value.trim(),
    direccion: document.getElementById('pf-direccion').value.trim(),
    refs:      document.getElementById('pf-refs').value.trim()
  };
  try {
    localStorage.setItem('sushi_profile', JSON.stringify(profile));
    var ok = document.getElementById('save-ok');
    ok.style.display = 'block';
    setTimeout(function() { ok.style.display = 'none'; }, 2500);
  } catch(e) { alert('No se pudo guardar la información.'); }
}

// ---- HISTORIAL ----
function getHist() {
  try { return JSON.parse(localStorage.getItem('sushi_hist') || '[]'); }
  catch(e) { return []; }
}

function clearHist() {
  if (!confirm('¿Borrar todo el historial?')) return;
  localStorage.removeItem('sushi_hist');
  renderAll();
}

function formatFecha(iso) {
  try {
    var d = new Date(iso);
    var dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    var meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    var hh = d.getHours(), mm = d.getMinutes();
    return dias[d.getDay()] + ' ' + d.getDate() + ' ' + meses[d.getMonth()] + ' ' + d.getFullYear()
      + ' · ' + (hh < 10 ? '0'+hh : hh) + ':' + (mm < 10 ? '0'+mm : mm);
  } catch(e) { return iso; }
}

function renderStats(hist) {
  if (!hist.length) {
    document.getElementById('stats-row').style.display = 'none';
    return;
  }
  document.getElementById('stats-row').style.display = 'grid';
  var totalMXN = hist.reduce(function(s,h){return s+h.total;},0);
  document.getElementById('stat-pedidos').textContent = hist.length;
  document.getElementById('stat-total').textContent = '$' + totalMXN.toLocaleString();
  // favorite item
  var freq = {};
  hist.forEach(function(h) {
    (h.items||[]).forEach(function(it) {
      freq[it.name] = (freq[it.name]||0) + it.qty;
    });
  });
  var fav = Object.keys(freq).sort(function(a,b){return freq[b]-freq[a];})[0];
  document.getElementById('stat-fav').textContent = fav ? fav.split(' ')[0] : '—';
}

function reorder(idx) {
  var hist = getHist();
  var rec = hist[idx];
  if (!rec) return;
  var profile = JSON.parse(localStorage.getItem('sushi_profile')||'{}');
  var tel = profile.telefono || rec.telefono || '';
  var lines = ['🍣 *REORDEN — La Esquina del Sushi*','━━━━━━━━━━━━━━━━━━━━',''];
  (rec.items||[]).forEach(function(it) {
    lines.push(it.emoji + ' *' + it.name + '* x' + it.qty + ' — $' + (it.price * it.qty));
    if (it.protein) lines.push('   🥩 Proteína: ' + it.protein);
    if (it.sauces && it.sauces.length) lines.push('   🫙 Salsa: ' + it.sauces.join(', '));
  });
  lines.push('','━━━━━━━━━━━━━━━━━━━━');
  lines.push('💰 *TOTAL: $' + rec.total + ' MXN*');
  if (tel) lines.push('📞 Tel: ' + tel);
  if (rec.notas) lines.push('\n📝 ' + rec.notas);
  lines.push('\n🌸 La Esquina del Sushi · Blvd. Sonora #21');
  window.open('https://wa.me/' + WA + '?text=' + encodeURIComponent(lines.join('\n')), '_blank');
}

function toggleCard(el) {
  el.classList.toggle('open');
}

function renderOrders(hist) {
  var list = document.getElementById('orders-list');
  var countEl = document.getElementById('hist-count');
  var actEl = document.getElementById('hist-actions');

  if (!hist.length) {
    countEl.textContent = '';
    actEl.style.display = 'none';
    list.innerHTML = '<div class="empty-state">'
      + '<span class="empty-icon">🍣</span>'
      + '<h3>Sin pedidos aún</h3>'
      + '<p>Cuando hagas tu primer pedido por WhatsApp,<br>aparecerá aquí automáticamente.</p>'
      + '<a class="btn-go-menu" href="esquina-del-sushi.html">Ver el menú</a>'
      + '</div>';
    return;
  }

  countEl.textContent = '(' + hist.length + ')';
  actEl.style.display = 'flex';

  list.innerHTML = hist.map(function(rec, idx) {
    var itemsHtml = (rec.items||[]).map(function(it) {
      var mods = '';
      if (it.protein) mods += '<div class="oi-mods oi-prot">🥩 ' + it.protein + '</div>';
      if (it.sauces && it.sauces.length) mods += '<div class="oi-mods oi-sauce">🫙 ' + it.sauces.join(', ') + '</div>';
      return '<div class="order-item-row">'
        + '<span class="oi-emoji">' + it.emoji + '</span>'
        + '<div class="oi-info"><div class="oi-name">' + it.name + '</div>'
        + '<div class="oi-qty">x' + it.qty + '</div>' + mods + '</div>'
        + '<span class="oi-price">$' + (it.price * it.qty) + '</span>'
        + '</div>';
    }).join('');

    var notasHtml = rec.notas
      ? '<div class="order-notas"><strong>📝 Notas:</strong> ' + rec.notas + '</div>' : '';

    return '<div class="order-card" id="oc-' + idx + '">'
      + '<div class="order-card-head" onclick="toggleCard(document.getElementById(\'oc-' + idx + '\'))">'
      +   '<div class="order-head-left">'
      +     '<div class="order-num">Pedido #' + (hist.length - idx) + '</div>'
      +     '<div class="order-date">' + formatFecha(rec.fecha) + '</div>'
      +   '</div>'
      +   '<div class="order-head-right">'
      +     '<span class="order-total">$' + rec.total + '</span>'
      +     '<span class="order-chevron">&#x25BC;</span>'
      +   '</div>'
      + '</div>'
      + '<div class="order-body">'
      +   itemsHtml
      +   notasHtml
      +   '<button class="btn-reorder" onclick="reorder(' + idx + ')">'
      +     '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.136.564 4.14 1.549 5.874L.057 23.617a.5.5 0 0 0 .617.617l5.743-1.492A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22A9.966 9.966 0 0 1 6.57 20.27l-.373-.222-3.865 1.004 1.025-3.755-.243-.389A9.96 9.96 0 0 1 2 12C2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg>'
      +     'Repetir pedido por WhatsApp'
      +   '</button>'
      + '</div>'
      + '</div>';
  }).join('');
}

function renderAll() {
  var hist = getHist();
  renderStats(hist);
  renderOrders(hist);
}

// ---- INIT ----
initPetals();
loadProfile();
renderAll();

// Auto-fill tel en el menú si se regresa
window.addEventListener('focus', function() { loadProfile(); });
</script>
</body>
</html>
